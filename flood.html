<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тёмная тема</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(circle at 30% 10%, #0a0a12, #020205);
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            color: #edf2fb;
            padding: 2rem 1.5rem;
            min-height: 100vh;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            background: linear-gradient(130deg, #f5f0ff, #b794f4);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 2rem;
        }
        .records-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.4rem;
            margin-bottom: 2rem;
        }
        .text-slot {
            background: rgba(18, 20, 33, 0.8);
            backdrop-filter: blur(3px);
            border: 1px solid #32364f;
            border-radius: 1.8rem;
            padding: 1.2rem;
            min-height: 130px;
            font-size: 1rem;
            color: #eff3ff;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.3);
        }
        .buttons-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.3rem;
            margin: 1.5rem 0 2rem;
        }
        .color-btn {
            background: #ff4d4d;
            border: none;
            border-radius: 60px;
            padding: 0.8rem 1.5rem;
            min-width: 130px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            text-align: center;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
            font-family: inherit;
        }
        .color-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
        }
        .color-btn:active {
            transform: scale(0.98);
        }
        @media (max-width: 680px) {
            .text-slot {
                min-height: 100px;
            }
            .color-btn {
                min-width: 110px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>записи и кнопки</h1>

    <div class="records-grid">
        <div class="text-slot">1</div>
        <div class="text-slot">2</div>
        <div class="text-slot">3</div>
        <div class="text-slot">4</div>
        <div class="text-slot">5</div>
        <div class="text-slot">6</div>
        <div class="text-slot">7</div>
        <div class="text-slot">8</div>
        <div class="text-slot">9</div>
        <div class="text-slot">10</div>
    </div>

    <div class="buttons-container">
        <button class="color-btn">кнопка 1</button>
        <button class="color-btn">кнопка 2</button>
        <button class="color-btn">кнопка 3</button>
        <button class="color-btn">кнопка 4</button>
        <button class="color-btn">кнопка 5</button>
        <button class="color-btn">кнопка 6</button>
        <button class="color-btn">кнопка 7</button>
    </div>
</div>

<script>
    const colorGradient = [
        "#ff4d4d",
        "#ff8c42",
        "#ffd966",
        "#6fcf97",
        "#5dade2",
        "#5b5be6",
        "#b97aff"
    ];
    const buttons = document.querySelectorAll('.color-btn');
    buttons.forEach((btn) => {
        btn.style.backgroundColor = colorGradient[0];
        let index = 0;
        btn.addEventListener('click', () => {
            index = (index + 1) % colorGradient.length;
            btn.style.backgroundColor = colorGradient[index];
        });
    });
</script>
</body>
</html>
